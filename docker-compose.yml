services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./Qwen3.5-2B-Q8_0.gguf:/models/Qwen3.5-2B-Q8_0.gguf:ro
      - ./models:/models
    environment:
      - LLAMA_ARG_MODEL=/models/Qwen3.5-2B-Q8_0.gguf
      - LLAMA_ARG_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
     
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - 'WEBUI_SECRET_KEY=replace-with-a-long-random-secret'
      - 'OPENAI_API_BASE_URL=http://llama-cpp:8080/v1'
    depends_on:
      - llama-cpp


  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: dcgm-exporter
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add:
      - SYS_ADMIN
    ports:
      - "9400:9400"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      # Enables anonymous access [2, 19]
      - GF_AUTH_ANONYMOUS_ENABLED=true
      # Sets the organization for anonymous users (usually 'Main Org.') [2]
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      # Sets the role (Viewer, Editor, or Admin) [2, 30]
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      # Optional: Hides the login form entirely [2, 18]
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped    
volumes:
  prometheus-data:
  grafana-storage:

